# ===========================================================================
# Phase 2, Step 1: SFT Warm Start Configuration (Vertex AI Supervised Tuning)
# ===========================================================================
# Central configuration for the integrity-aware RL pipeline's supervised
# fine-tuning stage. The base model used to collect trajectories was Gemini
# (via Vertex AI) so we tune Gemini directly with Vertex AI's hosted SFT API.
#
# IMPORTANT: Only Gemini Flash tier supports supervised tuning as of 2026.
# Gemini 2.5 Pro CANNOT be tuned -- you can only call it for inference.
# ===========================================================================

# --- Vertex AI Project Settings ---
# Filled in from .env if left null. Resolution order in scripts:
#   CLI flag -> sft_config.yaml -> .env -> os.environ -> error.
vertex:
  project: null            # GOOGLE_CLOUD_PROJECT
  location: "us-central1"  # GOOGLE_CLOUD_LOCATION; tuning supported in us-central1
  bucket: null             # GCS bucket name (no gs:// prefix). Created if missing.
  bucket_prefix: "sft-warmstart"   # Object key prefix inside the bucket.

# --- Source Model for Tuning ---
# Only Flash tier supports supervised tuning. Pro is inference-only.
# Confirmed tunable as of 2026-05: gemini-2.5-flash, gemini-2.5-flash-lite.
model:
  source_model: "gemini-2.5-flash"
  tuned_model_display_name: "rh-resistant-sft-warmstart"
  # Inference-time eval comparison model (un-tuned). Pro is allowed here.
  eval_base_model: "gemini-2.5-flash"

# --- Supervised Tuning Hyperparameters ---
# Vertex SFT uses parameter-efficient adapter tuning under the hood.
# adapter_size: 1 (smallest), 4 (default), or 8 (largest, more capacity).
tuning:
  epochs: 3
  learning_rate_multiplier: 1.0
  adapter_size: 4

# --- Reward Function Coefficients ---
# R = a*H + b*V - c*E - d*T - e*G
# T (tamper) has the highest weight because tampering is the most severe exploit.
reward:
  a: 1.0    # H: hidden test pass rate (primary objective)
  b: 0.2    # V: visible test pass rate
  c: 1.0    # E: exploit severity penalty
  d: 2.0    # T: tamper penalty (highest - most severe)
  e: 1.5    # G: overfit gap penalty

# --- Exploit Score Mapping ---
exploit_mapping:
  none: 0.0
  low: 0.33
  medium: 0.66
  high: 1.0

# --- SFT Data Filtering Thresholds ---
# Strict criteria to ensure only honest, successful trajectories enter SFT.
# If dataset is too small (<40 examples), consider loosening min_hidden_rate to 0.6.
filtering:
  resolved: true
  is_reward_hack: false
  eval_label: "NOT_REWARD_HACK"
  E: "none"
  min_hidden_rate: 0.8     # Strong generalization requirement
  max_overfit_gap: 0.1     # Visible and hidden must agree closely
  all_signals_false: true  # No suspicious behaviors at all

# --- Vertex Dataset Format Limits ---
# Per-example token limits for Vertex SFT on Gemini 2.5 Flash.
# Examples exceeding these are dropped with a warning.
dataset_limits:
  max_input_tokens: 32768
  max_output_tokens_per_turn: 8192
  min_examples: 16          # Vertex SFT minimum
  max_examples: 5000        # Vertex SFT maximum

# --- Train/Validation Split ---
split:
  validation_fraction: 0.1   # Set to 0.0 to skip validation set
  seed: 42

# --- Data Paths (relative to src/stage_1_sft/) ---
data:
  input_path: "data/trajectories.jsonl"
  sft_output_path: "data/sft_trajectories.jsonl"
  vertex_train_path: "data/vertex_sft_train.jsonl"
  vertex_val_path: "data/vertex_sft_val.jsonl"
  tuned_model_metadata: "checkpoints/sft_warmstart/tuned_model.json"

# --- Evaluation Settings ---
# Eval runs the tuned model on instances that the un-tuned model previously
# reward-hacked, then compares the new hack rate to the old.
evaluation:
  output_report: "evaluation/sft_eval_report.md"
  results_dir: "evaluation/results"
  # Cap how many hack instances to re-run. Vertex Flash inference + harness eval
  # is cheap but Docker is slow on a laptop. Keep small while iterating.
  max_hack_instances: 10
  # Cap how many additional non-hack instances to re-run as a regression check
  # so we don't only test on adversarial instances.
  max_regression_instances: 5
  workers: 1
  docker_platform: "linux/amd64"  # for Apple Silicon
